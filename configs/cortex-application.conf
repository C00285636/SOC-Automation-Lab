# Cortex application.conf
# NOTE: Sensitive values replaced with placeholders for public repository

include "/etc/cortex/secret.conf"
play.http.context = "/cortex"

play.http.parser.maxDiskBuffer = 100MB
play.http.parser.maxMemoryBuffer = 100MB

search {
  index = cortex
  uri = "http://elasticsearch:9200"
  user = "elastic"
  password = "***CHANGEME***"
}

cluster {
  name = hive
}

cache.job = 10 minutes

auth {
  method.basic = true
  provider = [local]
}

job {
  runner = [docker]
  directory = "/tmp/cortex-jobs"
  dockerDirectory = "/opt/thp/cortex/jobs"
}

analyzer {
  urls = ["https://catalogs.download.strangebee.com/latest/json/analyzers.json"]
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 4
  }
}

responder {
  urls = ["https://catalogs.download.strangebee.com/latest/json/responders.json"]
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 4
  }
}
